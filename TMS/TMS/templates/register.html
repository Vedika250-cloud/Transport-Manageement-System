<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMS Customer Registration</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<script src="https://unpkg.com/lucide@latest"></script>
<script>
    // Theme Initialization (Prevent FOUC)
    const savedTheme = localStorage.getItem('tms_theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
        document.documentElement.setAttribute('data-theme', 'dark');
    }
</script>
</head>
<body class="login-body">

<button id="theme-toggle" class="btn-secondary" style="position: fixed; bottom: 40px; right: 40px; border-radius: 50px; padding: 12px 24px; display: flex; align-items: center; gap: 12px; justify-content: center; z-index: 1000; border: 1px solid var(--border-color); background: var(--bg-card); cursor: pointer; box-shadow: var(--shadow-lg); transition: var(--transition-fast); font-weight: 600; color: var(--text-main); font-size: 15px;">
    <i data-lucide="sun" id="theme-icon-light" style="display: none; width: 20px; height: 20px;"></i>
    <i data-lucide="moon" id="theme-icon-dark" style="width: 20px; height: 20px;"></i>
    <span>Theme</span>
</button>

<div class="login-box" style="max-width: 500px;">
    <h2>Create Customer Account</h2>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="{{ category }}-msg">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="/register">
        <div style="display: flex; gap: 15px;">
            <div class="input-group">
                <label>First Name</label>
                <input type="text" name="first_name" required>
            </div>
            <div class="input-group">
                <label>Last Name</label>
                <input type="text" name="last_name" required>
            </div>
        </div>
        
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" name="email" required>
        </div>

        <div class="input-group">
            <label>Phone Number</label>
            <input type="text" name="phone">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" minlength="6" required>
        </div>

        <button type="submit" class="btn-login">Register as Customer</button>
        <a href="/" style="display: block; text-align: center; margin-top: 20px; color: var(--accent); text-decoration: none; font-weight: 500;">← Back to Portal</a>
    </form>
</div>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
<script>
    lucide.createIcons();
</script>
</body>
</html>
