<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMS Login</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<script src="https://unpkg.com/lucide@latest"></script>
<script>
    // Theme Initialization (Prevent FOUC)
    const savedTheme = localStorage.getItem('tms_theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
        document.documentElement.setAttribute('data-theme', 'dark');
    }
</script>
</head>
<body class="login-body">

<button id="theme-toggle" class="btn-secondary" style="position: fixed; bottom: 40px; right: 40px; border-radius: 50px; padding: 12px 24px; display: flex; align-items: center; gap: 12px; justify-content: center; z-index: 1000; border: 1px solid var(--border-color); background: var(--bg-card); cursor: pointer; box-shadow: var(--shadow-lg); transition: var(--transition-fast); font-weight: 600; color: var(--text-main); font-size: 15px;">
    <i data-lucide="sun" id="theme-icon-light" style="display: none; width: 20px; height: 20px;"></i>
    <i data-lucide="moon" id="theme-icon-dark" style="width: 20px; height: 20px;"></i>
    <span>Theme</span>
</button>

<div class="login-box">
<img src="https://images-platform.99static.com/AfjT2Rd4UCk-1_gcYAVwxbSnl44=/342x815:1226x1699/fit-in/projects-files/162/16296/1629617/76299882-b512-4e81-93ad-9e15ccac4e9c.jpg" alt="Transport Icon">

<h2>TMS Login</h2>

{% if error %}
<p class="error-msg">{{ error }}</p>
{% endif %}

<form method="POST" action="/login">
<div class="input-group">
<label>Email</label>
<input type="email" name="email" required>
</div>

<div class="input-group">
<label>Password</label>
<input type="password" name="password" required>
</div>


<button type="submit" class="btn-login">Login</button>
</form>

</div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
<script>
    lucide.createIcons();
</script>
</body>
</html>
