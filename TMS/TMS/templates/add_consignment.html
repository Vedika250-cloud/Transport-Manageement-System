{% extends "base.html" %}

{% block content %}
<div class="form-container">
    <div class="form-header"><h2>📦 Add Consignment</h2></div>
    <form action="/add_consignment" method="POST">
        
        <div class="input-group">
            <label>Assign to Trip (Optional)</label>
            <select name="trip_id">
                <option value="">-- Unassigned --</option>
                {% for t in trips %}
                <option value="{{ t.Trip_id }}">Trip #{{ t.Trip_id }} ({{ t.Route_From }} to {{ t.Route_To }})</option>
                {% endfor %}
            </select>
        </div>

        <div class="input-group">
            <label>Sender Name</label>
            <input type="text" name="sender" required>
        </div>

        <div class="input-group">
            <label>Receiver Name</label>
            <input type="text" name="receiver" required>
        </div>

        <div class="input-group">
            <label>Goods Type</label>
            <input type="text" name="goods_type" required>
        </div>

        <div class="input-group">
            <label>Weight (Tons)</label>
            <input type="number" step="0.1" name="weight" required>
        </div>

        <div class="input-group">
            <label>Freight Amount (₹)</label>
            <input type="number" step="0.01" name="amount" required>
        </div>

        <button type="submit" class="btn" style="width: 100%;">Create Consignment</button>
    </form>
</div>
{% endblock %}
