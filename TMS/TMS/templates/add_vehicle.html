{% extends "base.html" %}

{% block content %}
<div class="form-container">
    <div class="form-header"><h2>➕ Add Vehicle</h2></div>
    <form action="/add_vehicle" method="POST">
        <div class="input-group">
            <label>Truck Number (e.g. TRK-001)</label>
            <input type="text" name="truck_no" required>
        </div>
        <div class="input-group">
            <label>Registration Number (e.g. MH12AB1234)</label>
            <input type="text" name="reg_no" required>
        </div>
        <div class="input-group">
            <label>Capacity (Tons)</label>
            <input type="number" step="0.1" name="capacity" required>
        </div>
        <div class="input-group">
            <label>Status</label>
            <select name="status">
                <option value="available">Available</option>
                <option value="in_use">In Use</option>
                <option value="maintenance">Maintenance</option>
            </select>
        </div>
        <button type="submit" class="btn" style="width: 100%;">Save Vehicle</button>
    </form>
</div>
{% endblock %}
