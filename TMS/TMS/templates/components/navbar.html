
<div class="navbar">

<button class="mobile-menu-btn" onclick="toggleSidebar()">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
    </svg>
</button>

<h3>Transport Management System</h3>

<div style="display: flex; align-items: center; gap: 16px;">

<button id="theme-toggle" class="btn-secondary" style="border-radius: 50%; width: 40px; height: 40px; padding: 0; display: flex; align-items: center; justify-content: center; margin-bottom: 0;">
    <i data-lucide="sun" id="theme-icon-light" style="display: none;"></i>
    <i data-lucide="moon" id="theme-icon-dark"></i>
</button>

<div class="user">

{% if session.get('profile_pic') %}
<img src="{{ url_for('static', filename='uploads/profiles/' + session['profile_pic']) }}" alt="Avatar" style="width: 28px; height: 28px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border-light);">
{% else %}
<div style="width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-secondary)); display: flex; align-items: center; justify-content: center;">
  <span style="font-size: 12px; color: white;">👤</span>
</div>
{% endif %}
<span>{{ session["username"] }}</span>

</div>

</div>

</div>
