<!-- Toast Notifications -->
<div class="toast-container" id="toastContainer">
{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="toast toast-{{ category }}">
        <i data-lucide="{% if category == 'success' %}check-circle{% elif category == 'error' %}alert-circle{% elif category == 'warning' %}alert-triangle{% else %}info{% endif %}" class="toast-icon"></i>
        <span>{{ message }}</span>
        <button class="toast-close" onclick="this.parentElement.remove()"><i data-lucide="x"></i></button>
      </div>
    {% endfor %}
  {% endif %}
{% endwith %}
</div>
